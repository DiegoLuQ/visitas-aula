<!-- Página Dashboard Visitas -->
<div id="pageVisitasDashboard" class="page">
    <div class="page-header">
        <h1>Dashboard de Visitas a Aula</h1>
        <p class="subtitle">Seguimiento y acompañamiento directivo</p>
    </div>

    <!-- Filtro de Colegio (solo para admins globales) -->
    <div id="visitasDashboardFilter" style="background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--shadow); display: none;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="background: #f1f5f9; padding: 10px; border-radius: 10px; font-size: 1.2rem;">🏢</div>
            <div style="flex: 1;">
                <label style="display: block; font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px;">Filtrar por Establecimiento</label>
                <select id="visitaDashColegio" class="form-control" style="background: #f8fafc; border: 1px solid #e2e8f0; font-weight: 600;"></select>
            </div>
        </div>
    </div>

    <!-- KPIs -->
    <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <div class="stat-card" style="background: #fff; padding: 20px; border-radius: 15px; box-shadow: var(--shadow); border-left: 5px solid #3b82f6; display: flex; align-items: center; gap: 15px; min-width: 0;">
            <div class="stat-icon" style="font-size: 1.8rem; background: #eff6ff; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; flex-shrink: 0;">📋</div>
            <div style="display: flex; flex-direction: column; min-width: 0;">
                <div class="stat-value" id="visitasRealizadas" style="font-size: 1.8rem; font-weight: 800; color: #1e293b; line-height: 1;">0</div>
                <div class="stat-label" style="color: #64748b; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.02em; line-height: 1.2;">Visitas Realizadas</div>
            </div>
        </div>
        <div class="stat-card" style="background: #fff; padding: 20px; border-radius: 15px; box-shadow: var(--shadow); border-left: 5px solid #ef4444; display: flex; align-items: center; gap: 15px; min-width: 0;">
            <div class="stat-icon" style="font-size: 1.8rem; background: #fef2f2; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; flex-shrink: 0;">⏳</div>
            <div style="display: flex; flex-direction: column; min-width: 0;">
                <div class="stat-value" id="visitasPendientes" style="font-size: 1.8rem; font-weight: 800; color: #1e293b; line-height: 1;">0</div>
                <div class="stat-label" style="color: #64748b; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.02em; line-height: 1.2;">Docentes sin Visita</div>
            </div>
        </div>
        <div class="stat-card" style="background: #fff; padding: 20px; border-radius: 15px; box-shadow: var(--shadow); border-left: 5px solid #10b981; display: flex; align-items: center; gap: 15px; min-width: 0;">
            <div class="stat-icon" style="font-size: 1.8rem; background: #f0fdf4; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; flex-shrink: 0;">📈</div>
            <div style="display: flex; flex-direction: column; min-width: 0;">
                <div class="stat-value" id="visitasPromedio" style="font-size: 1.8rem; font-weight: 800; color: #1e293b; line-height: 1;">0.0</div>
                <div class="stat-label" style="color: #64748b; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.02em; line-height: 1.2;">Puntaje Promedio</div>
            </div>
        </div>
        <div class="stat-card" style="background: #fff; padding: 20px; border-radius: 15px; box-shadow: var(--shadow); border-left: 5px solid #8b5cf6; display: flex; align-items: center; gap: 15px; min-width: 0;">
            <div class="stat-icon" style="font-size: 1.8rem; background: #f5f3ff; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; flex-shrink: 0;">🏢</div>
            <div style="display: flex; flex-direction: column; min-width: 0;">
                <div class="stat-value" id="visitasCobertura" style="font-size: 1.8rem; font-weight: 800; color: #1e293b; line-height: 1;">0%</div>
                <div class="stat-label" style="color: #64748b; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-top: 4px; letter-spacing: 0.02em; line-height: 1.2;">Cobertura de Aula</div>
            </div>
        </div>
    </div>

    <!-- Dos tablas lado a lado (1 columna en pantallas chicas) -->
    <div class="visitas-dual-grid">
        <!-- Tabla: Docentes NO visitados -->
        <div style="background: #fff; padding: 25px; border-radius: 15px; box-shadow: var(--shadow);">
            <h3 style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: #ef4444;">
                <span>⏳</span> Docentes Pendientes
            </h3>
            <div style="max-height: 400px; overflow-y: auto; overflow-x: auto;">
                <table class="data-table cards-sm" style="width:100%;">
                    <thead>
                        <tr>
                            <th>Docente</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="visitasPendientesBody">
                        <tr><td colspan="2" class="text-center">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tabla: Docentes YA visitados -->
        <div style="background: #fff; padding: 25px; border-radius: 15px; box-shadow: var(--shadow);">
            <h3 style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: #10b981;">
                <span>✅</span> Docentes Visitados
            </h3>
            <div style="max-height: 400px; overflow-y: auto; overflow-x: auto;">
                <table class="data-table cards-sm" style="width:100%;">
                    <thead>
                        <tr>
                            <th>Docente</th>
                            <th>N° Visitas</th>
                            <th>Última Visita</th>
                        </tr>
                    </thead>
                    <tbody id="visitasRealizadasBody">
                        <tr><td colspan="3" class="text-center">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
