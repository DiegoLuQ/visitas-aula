<!-- Página Inicio -->
<div id="pageInicio" class="page active">
    <div class="page-header">
        <h1>Dashboard</h1>
        <div class="header-filters">
            <select id="filterColegioDashboard" class="form-select" onchange="app.loadDashboardStats()">
                <option value="all">Todos los Colegios</option>
            </select>
        </div>
    </div>

    <!-- Estadísticas Principales -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon" style="background: #e0f2fe; color: #0369a1;">📊</div>
            <div class="stat-info">
                <span class="stat-value" id="statTotal">0</span>
                <span class="stat-label">Acompañamientos Cerrados</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #f0fdf4; color: #15803d;">📈</div>
            <div class="stat-info">
                <span class="stat-value" id="statPromedio">0</span>
                <span class="stat-label">Promedio General</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon" style="background: #fef2f2; color: #b91c1c;">👨‍🏫</div>
            <div class="stat-info">
                <span class="stat-value" id="statDocentes">0</span>
                <span class="stat-label">Docentes Observados</span>
            </div>
        </div>
    </div>

    <!-- Acciones Rápidas Profesionales -->
    <h2 class="section-title">
        <i class="fas fa-bolt" style="color: #f59e0b;"></i> Acciones Rápidas
    </h2>
    <div class="quick-actions-grid">
        <button class="action-btn primary" onclick="app.navigateTo('nueva-evaluacion')">
            <div class="action-icon">
                <i class="fas fa-plus"></i>
            </div>
            <div class="action-text">
                <strong>Nuevo Acompañamiento</strong>
                <span>Iniciar observación</span>
            </div>
        </button>
        
        <button class="action-btn" onclick="window.app.exportarDocentesExcel()">
            <div class="action-icon" style="color: #15803d;">
                <i class="fas fa-file-excel"></i>
            </div>
            <div class="action-text">
                <strong>Exportar Excel</strong>
                <span>Descargar datos docentes</span>
            </div>
        </button>
        
        <button class="action-btn" onclick="app.navigateTo('evaluaciones')">
            <div class="action-icon" style="color: #0369a1;">
                <i class="fas fa-list-ul"></i>
            </div>
            <div class="action-text">
                <strong>Historial</strong>
                <span>Ver todos los registros</span>
            </div>
        </button>
    </div>

    <!-- Borradores Pendientes -->
    <div class="dashboard-section">
        <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 class="section-title" style="margin: 0;">
                <i class="fas fa-edit" style="color: #6366f1;"></i> Borradores Pendientes
            </h2>
            <span class="badge" id="badgeBorradoresCount" style="background: #fef3c7; color: #92400e; padding: 6px 15px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; border: 1px solid #fde68a; display: none;">
                0 Pendientes
            </span>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Docente / Colegio</th>
                            <th>Fecha Pauta</th>
                            <th class="text-center">Promedio</th>
                            <th class="text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tableBorradoresDashboard">
                        <tr>
                            <td colspan="4" class="text-center p-5">
                                <div class="spinner" style="margin: 0 auto 10px;"></div>
                                <p style="color: var(--text-light);">Cargando borradores...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
