<!-- Página Historial de Visitas -->
<div id="pageVisitasHistorial" class="page">
    <div class="page-header">
        <h1>Historial de Visitas a Aula</h1>
        <button class="btn btn-primary" onclick="window.app.navigateTo('visitas-nueva')">Nueva Visita</button>
    </div>

    <!-- Barra de Filtros -->
    <div class="filters-bar" style="display:flex; gap:12px; flex-wrap:wrap; align-items:center; background:#fff; padding:14px 20px; border-radius:10px; margin-bottom:20px; box-shadow:var(--shadow);">
        <select id="filterVisitaColegio" class="form-select" style="min-width:180px;">
            <option value="">Todos los Colegios</option>
        </select>
        <input type="text" id="filterVisitaDocente" class="form-select" style="min-width:180px;" placeholder="🔍 Buscar docente...">
        <select id="filterVisitaVisitante" class="form-select" style="min-width:180px;">
            <option value="">Todos los Visitantes</option>
        </select>
        <select id="filterVisitaEstado" class="form-select" style="min-width:160px;">
            <option value="">Todos los Estados</option>
        </select>
        <select id="filterVisitaTipo" class="form-select" style="min-width:200px;">
            <option value="">Todos los Acompañamientos</option>
        </select>
        <input type="date" id="filterVisitaDesde" class="form-select" style="min-width:150px;" title="Desde">
        <input type="date" id="filterVisitaHasta" class="form-select" style="min-width:150px;" title="Hasta">
        <button class="btn btn-secondary" onclick="window.app.limpiarFiltrosVisitas()">✖ Limpiar</button>
    </div>

    <!-- Tarjetas (solo móvil) -->
    <div id="visitasCards" class="historial-cards"></div>

    <!-- Tabla (escritorio/tablet) -->
    <div class="table-container historial-desktop">
        <table class="data-table" id="visitasTable">
            <thead>
                <tr>
                    <th>Cod</th>
                    <th>Fecha</th>
                    <th>Docente</th>
                    <th>Colegio</th>
                    <th>Visitante</th>
                    <th>Acompañamientos</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="visitasBody">
                <tr>
                    <td colspan="7" class="text-center">Cargando visitas...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
