server {
    listen 80;
    server_name localhost;

    # Tamaño máximo de subida (coincide con el límite del backend para PDFs de visitas).
    client_max_body_size 25M;

    # Directorio de archivos estáticos
    root /usr/share/nginx/html;
    index index.html login.html;

    # Manejo de rutas para SPA (si corresponde) o fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para las llamadas a la API
    # Soporta tanto /api como /api/ y maneja redirecciones del backend
    location /api {
        rewrite ^/api/(.*)$ /$1 break;
        rewrite ^/api$ / break;
        proxy_pass http://visit_back:8000;
        proxy_redirect http://visit_back:8000/ /api/;
        proxy_redirect / /api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optimización de archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
