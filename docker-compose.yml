version: '3.8'
services:
  visit_back:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visit_back
    # Ya no necesitas mapear el puerto del backend al host (ej. 8000:8000)
    # porque el frontend o el proxy se comunican internamente.
    networks:
      - red_produccion
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DOCKER_DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
    # Persiste los PDF de visitas históricas entre reconstrucciones del contenedor.
    volumes:
      - pdf_visitas_data:/app/uploads
    restart: always

  visit_front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: visit_front
    # Eliminamos los puertos mapeados al host (80:80)
    # Agregamos las variables para el Proxy y SSL
    environment:
      - VIRTUAL_HOST=liderazgo.dpmc.cl
      - LETSENCRYPT_HOST=liderazgo.dpmc.cl
    networks:
      - red_produccion
    restart: always
    depends_on:
      - visit_back

networks:
  red_produccion:
    external: true

volumes:
  pdf_visitas_data:
